name: Framework and case feedback
description: Share structured feedback on the framework, a case study, its evidence or developer experience.
title: "[Feedback]: "
labels: [feedback]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Power BI report and UX
        - Data model and DAX
        - Source adapters and refresh performance
        - RLS and security evidence
        - Automation workflow
        - New case-study proposal
        - Documentation and onboarding
    validations:
      required: true
  - type: textarea
    id: observation
    attributes:
      label: What did you observe?
      description: Please separate confirmed facts from suggestions.
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: What would you change?
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I have not included credentials, PBIX files, private data or unredacted logs.
          required: true
