name: Python quality gates

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: projects/enterprise-sales-automation/requirements.txt
      - name: Install project dependencies
        run: python -m pip install -r projects/enterprise-sales-automation/requirements.txt
      - name: Validate documentation
        run: python scripts/bi_workflow_runtime.py validate-docs --project-path projects/enterprise-sales-automation
      - name: Validate PBIR report contract
        run: python scripts/Test-BIReportQA.py --project-path projects/enterprise-sales-automation
      - name: Test workflow runtime
        run: python -m unittest tests.test_bi_workflow_runtime tests.test_report_qa
      - name: Test project contracts
        run: python -m unittest discover -s projects/enterprise-sales-automation/tests -p "test_*.py"
